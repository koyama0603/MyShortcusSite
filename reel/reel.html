<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1920, height=1080" />
<title>My Shortcuts — Promo Reel</title>
<link rel="stylesheet" href="reel.css" />
</head>
<body>
<div class="stage">

  <div class="mark">
    <img src="../assets/logo.png" alt="" width="38" height="38" />
    <span>My Shortcuts</span>
  </div>

  <!-- 0 intro -->
  <section class="scene scene--title" data-scene="0">
    <div class="title">
      <img class="title__logo" src="../assets/logo.png" alt="" width="138" height="138" data-anim="0" />
      <h1 data-anim="0.18">ブラウザに、<br>自分だけのデスクトップを。</h1>
      <p class="title__sub" data-anim="0.45">My Shortcuts</p>
    </div>
  </section>

  <!-- 1 overview -->
  <section class="scene" data-scene="1">
    <div class="shot"><img src="shots/01-overview.png" alt="" /></div>
    <div class="cap"><span class="cap__tag">ホーム画面</span><span class="cap__line">よく使うもの、ぜんぶをひとつの画面に。</span></div>
  </section>

  <!-- 2 create -->
  <section class="scene" data-scene="2">
    <div class="shot"><img src="shots/02-create-menu.png" alt="" /></div>
    <div class="cap"><span class="cap__tag">つくる</span><span class="cap__line">サイトも、メモも、アプリも置ける。</span></div>
  </section>

  <!-- 3 folder -->
  <section class="scene" data-scene="3">
    <div class="shot"><img src="shots/03-folder.png" alt="" /></div>
    <div class="cap"><span class="cap__tag">整理</span><span class="cap__line">増えてきたら、フォルダへ。</span></div>
  </section>

  <!-- 4 media -->
  <section class="scene" data-scene="4">
    <div class="shot"><img src="shots/11-youtube.png" alt="" /></div>
    <div class="cap"><span class="cap__tag">メディア</span><span class="cap__line">動画も音楽も、画面を離れずに。</span></div>
  </section>

  <!-- 5 html app -->
  <section class="scene" data-scene="5">
    <div class="shot"><img src="shots/10-htmlapp.png" alt="" /></div>
    <div class="cap"><span class="cap__tag">自分のアプリ</span><span class="cap__line">つくったものが、そのまま動く。</span></div>
  </section>

  <!-- 6 desktops -->
  <section class="scene" data-scene="6">
    <div class="shot"><img src="shots/09-desktop2.png" alt="" /></div>
    <div class="cap"><span class="cap__tag">切り替え</span><span class="cap__line">3つの画面を、用途で使い分け。</span></div>
  </section>

  <!-- 7 outro -->
  <section class="scene scene--title" data-scene="7">
    <div class="title">
      <img class="title__logo" src="../assets/logo.png" alt="" width="126" height="126" data-anim="0" />
      <h1 class="title__h2" data-anim="0.18">今日から、ブラウザが<br>もっと自分らしく。</h1>
      <p class="title__sub" data-anim="0.45">Microsoft Edge / Chrome 対応 — 無料</p>
    </div>
  </section>

  <div class="progress"><span class="progress__bar"></span></div>
</div>
<script src="reel.js"></script>
</body>
</html>
